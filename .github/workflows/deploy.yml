name: Deploy to Cloudflare

on:
  push:
    branches:
      - master
  workflow_dispatch:

jobs:
  test-node:
    name: Test (Node Mode)
    runs-on: ubuntu-latest
    if: github.repository != 'alexazhou/gt_ai_gateway'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install Dependencies
        run: |
          npm ci
          cd frontend && npm ci && cd ..

      - name: Build Frontend
        run: npm run frontend:build

      - name: Run type check
        run: npm run backend:test:type

      - name: Run tests (Node mode)
        run: npm run backend:test:node

  test-worker:
    name: Test (Worker Mode)
    runs-on: ubuntu-latest
    if: github.repository != 'alexazhou/gt_ai_gateway'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install Dependencies
        run: |
          npm ci
          cd frontend && npm ci && cd ..

      - name: Build Frontend
        run: npm run frontend:build

      - name: Run tests (Worker mode)
        run: npm run backend:test:worker

  deploy:
    name: Deploy
    needs: [test-node, test-worker]
    runs-on: ubuntu-latest
    if: github.repository != 'alexazhou/gt_ai_gateway'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install Dependencies
        run: |
          npm ci
          cd frontend && npm ci && cd ..

      - name: Build Frontend
        run: npm run frontend:build

      - name: Check for Beta Version
        id: check_beta
        run: |
          VERSION=$(node -p "require('./package.json').version")
          if [[ "$VERSION" == *"-beta"* ]]; then
            echo "is_beta=true" >> "$GITHUB_OUTPUT"
            echo "Skipping Cloudflare deployment for beta version: $VERSION"
          else
            echo "is_beta=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Deploy to Cloudflare
        if: steps.check_beta.outputs.is_beta != 'true'
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          ROOT_TOKEN: ${{ secrets.ROOT_TOKEN }}
        run: |
          # The deploy script will verify environment variables, token permissions, 
          # create the database if needed, run migrations, and deploy the worker.
          npm run deploy:cloudflare -- --auto-create-db --auto-migrate --auto-create-root-token
