name: Deploy to Cloudflare

on:
  push:
    branches:
      - master
  workflow_dispatch:

jobs:
  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    if: github.repository != 'alexazhou/gt_ai_gateway'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install Dependencies
        run: |
          npm install
          cd frontend && npm install && cd ..

      - name: Build Frontend
        run: npm run frontend:build

      - name: Deploy to Cloudflare
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          ROOT_TOKEN: ${{ secrets.ROOT_TOKEN }}
        run: |
          # The deploy script will verify environment variables, token permissions, 
          # create the database if needed, run migrations, and deploy the worker.
          npm run deploy:cloudflare -- --auto-create-db --auto-migrate --auto-create-root-token
